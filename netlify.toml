[build]
  command = "cd web && npm install && npm run build"
  publish = "web/dist"

[context.production]
  command = "cd web && npm install && npm run build"
  publish = "web/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "cd web && npm install && npm run dev"
  port = 5173
